<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Financial AI · 티커 분석</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <header>
    <div class="header-top">
      <a
        id="github-banner"
        class="github-banner"
        href="https://github.com/Alex3463/financial-ai"
        target="_blank"
        rel="noopener noreferrer"
        title="GitHub 저장소"
      >
        <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true" width="14" height="14">
          <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        <span>Alex3463/financial-ai</span>
      </a>
    </div>
    <div class="header-row">
      <div>
        <h1>Financial AI · 티커 분석</h1>
        <p>티커를 입력하면 AI 리포트 요약·근거·리스크를 한눈에 확인할 수 있습니다.</p>
      </div>
      <div id="share-box" class="share-box" hidden>
        <span class="share-label">공개 링크</span>
        <a id="public-url" href="#" target="_blank" rel="noopener"></a>
        <button type="button" id="copy-url" class="copy-btn">복사</button>
      </div>
    </div>
    <p id="disclaimer" class="disclaimer">투자 권유가 아닙니다. 생성물은 참고용 데모입니다.</p>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <h2>분석 실행</h2>
      <form id="form">
        <label for="ticker">티커</label>
        <input id="ticker" type="text" placeholder="AAPL, TSLA, NVDA, 005930.KS" required />

        <label for="date">기준일 (선택)</label>
        <input id="date" type="date" title="비우면 오늘(UTC)" />

        <p id="cache-hint" class="cache-hint" hidden></p>

        <button type="submit" class="primary" id="submit">
          <span id="submit-label">리포트 생성</span>
          <span id="submit-spinner" class="spinner" hidden></span>
        </button>
      </form>

      <div id="progress" class="progress-box"></div>

      <h2 style="margin-top:1.5rem">접속 현황</h2>
      <div id="visitors" class="visitors-panel">
        <p class="muted-small">불러오는 중…</p>
      </div>

      <h2 style="margin-top:1.5rem">최근 실행</h2>
      <div id="history" class="history-list"></div>
    </aside>

    <main class="main">
      <div id="empty" class="empty-state">
        <p>왼쪽에서 티커를 입력하고 <strong>리포트 생성</strong>을 누르세요.</p>
        <p style="font-size:0.85rem">또는 아래 <strong>최근 실행</strong>에서 기존 산출물을 불러올 수 있습니다.</p>
      </div>

      <div id="results" style="display:none">
        <nav id="tabs" class="tabs"></nav>
        <div id="panels"></div>
      </div>
    </main>
  </div>

  <script src="/static/report_parser.js"></script>
  <script src="/static/chart_view.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
